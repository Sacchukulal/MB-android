# Magic Bill Android — release pipeline.
# Push a tag like v1.2.3 and this builds a signed APK, generates
# version.json, and publishes both as a GitHub Release. The app's in-app
# updater reads releases/latest/download/version.json.
#
# Required repo secrets (run keys/setup-github-secrets.ps1 once):
#   ANDROID_KEYSTORE_BASE64  — base64 of magic-bill-release.keystore
#   ANDROID_KEYSTORE_PASSWORD — the keystore/key password (alias: magicbill)
#
# If the secrets are NOT configured the job exits GREEN with a notice —
# releases are then built + signed locally and uploaded manually, which is
# the current flow. No red X either way.
#
# NOTE: keep app.json's expo.version in sync with the tag (the APK's
# versionName comes from app.json; version.json comes from the tag).

name: Release APK

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' }}

    steps:
      - name: Signing secrets not configured — skipping CI build
        if: env.HAS_SIGNING != 'true'
        run: |
          echo "::notice::ANDROID_KEYSTORE_* secrets are not set. This release is built and published locally instead. Run keys/setup-github-secrets.ps1 to enable CI builds."

      - uses: actions/checkout@v4
        if: env.HAS_SIGNING == 'true'

      - uses: actions/setup-node@v4
        if: env.HAS_SIGNING == 'true'
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        if: env.HAS_SIGNING == 'true'
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        if: env.HAS_SIGNING == 'true'
        run: npm ci

      - name: Generate native Android project
        if: env.HAS_SIGNING == 'true'
        run: npx expo prebuild --platform android --no-install
        env:
          # Anon key is public by design (shipped in every client).
          EXPO_PUBLIC_SUPABASE_URL: https://rlvygwituwywofwcwjsf.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}

      - name: Slim build config (arm64 only + R8 minify)
        if: env.HAS_SIGNING == 'true'
        run: |
          sed -i 's/^reactNativeArchitectures=.*/reactNativeArchitectures=arm64-v8a/' android/gradle.properties
          echo "android.enableMinifyInReleaseBuilds=true" >> android/gradle.properties
          grep -E "reactNativeArchitectures|Minify|Shrink" android/gradle.properties

      - name: Build release APK
        if: env.HAS_SIGNING == 'true'
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon
        env:
          EXPO_PUBLIC_SUPABASE_URL: https://rlvygwituwywofwcwjsf.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}

      - name: Sign APK with release keystore
        if: env.HAS_SIGNING == 'true'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          BUILD_TOOLS="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)"
          "$BUILD_TOOLS/zipalign" -f -p 4 \
            android/app/build/outputs/apk/release/app-release.apk aligned.apk
          "$BUILD_TOOLS/apksigner" sign \
            --ks release.keystore \
            --ks-key-alias magicbill \
            --ks-pass env:KS_PASS --key-pass env:KS_PASS \
            --out magic-bill.apk aligned.apk
          "$BUILD_TOOLS/apksigner" verify --print-certs magic-bill.apk
          rm release.keystore
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Generate version.json
        if: env.HAS_SIGNING == 'true'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME" | head -c 1500)
          [ -z "$NOTES" ] && NOTES="Magic Bill $VERSION"
          jq -n \
            --arg version "$VERSION" \
            --arg apk_url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/magic-bill.apk" \
            --arg release_notes "$NOTES" \
            '{version: $version, apk_url: $apk_url, release_notes: $release_notes}' \
            > version.json
          cat version.json

      - name: Create GitHub Release
        if: env.HAS_SIGNING == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            magic-bill.apk
            version.json
          generate_release_notes: true
